<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetroHack 2026 | Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #22d3ee;
            --neon-pink: #ec4899;
            --glass-bg: rgba(20, 15, 30, 0.5); 
            --glass-border: rgba(255, 255, 255, 0.15);
            --input-bg: rgba(0, 0, 0, 0.6);
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Press Start 2P', cursive;
            color: #fff;
            background-color: #1a0b2e;
            /* Using the pixel art background from your code */
            background-image: url('https://pandadsgn.github.io/Retrohack_2026/unnamed.jpg');
            background-size: cover;
            background-position: center bottom;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            -webkit-font-smoothing: none;
        }

        /* CRT SCANLINE EFFECT */
        body:after {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            z-index: 100;
            background-size: 100% 4px;
            pointer-events: none;
        }

        .container {
            width: 90%;
            max-width: 800px;
            margin-top: 50px;
            margin-bottom: 100px;
            z-index: 10;
        }

        /* --- GLASSMORPHIC PANELS --- */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        h1, h2 {
            color: var(--neon-pink);
            text-shadow: 2px 2px 0px #000;
            line-height: 1.5;
        }

        h1 { font-size: 18px; text-align: center; margin-bottom: 20px;}
        h2 { font-size: 14px; color: var(--neon-cyan); margin-top: 0; margin-bottom: 30px; }

        p {
            font-size: 10px;
            line-height: 2;
            text-shadow: 1px 1px 0px #000;
            margin-bottom: 15px;
        }

        /* --- FORM GRID LAYOUT --- */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        label {
            display: block;
            font-size: 9px;
            color: var(--neon-pink);
            margin-bottom: 10px;
            text-shadow: 1px 1px 0px #000;
        }

        select, input, textarea {
            width: 100%;
            padding: 15px;
            background: var(--input-bg);
            border: 1px solid transparent;
            border-radius: 10px;
            color: #fff;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        select { margin-bottom: 30px; border: 1px solid var(--neon-cyan); }

        input:focus, textarea:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.3);
        }

        button {
            width: 100%; padding: 18px;
            background: var(--neon-cyan); border: none; border-radius: 10px;
            color: #000; font-family: 'Press Start 2P', cursive;
            font-size: 11px; font-weight: bold; cursor: pointer;
            margin-top: 10px; box-shadow: 0 6px 0px #083344;
            transition: 0.1s;
        }

        button:hover { background: var(--neon-pink); box-shadow: 0 6px 0px #500724; transform: translateY(-2px); }
        button:active { transform: translateY(4px); box-shadow: 0 2px 0px #500724; }
        
        .btn-secondary { background: #cba6f7; box-shadow: 0 6px 0px #4c1d95; margin-bottom: 15px;}
        .btn-secondary:hover { background: #b4befe; box-shadow: 0 6px 0px #313244; }

        .msg {
            margin-top: 25px; padding: 20px; font-size: 9px; line-height: 1.5;
            text-align: center; border-radius: 10px;
            background: rgba(0,0,0,0.7); border: 1px solid var(--neon-cyan);
            color: #4ade80;
        }
        .msg.error { border-color: #f87171; color: #f87171; }
        .hidden { display: none; }

        .join-btn {
            display: inline-block; margin-top: 15px; padding: 12px 20px;
            color: #000; background: var(--neon-cyan); border-radius: 5px;
            text-decoration: none; font-size: 9px; font-weight: bold;
        }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="glass-panel">
            <h1>ABOUT RETROHACK</h1>
            <p>RetroHack is an 8-hour long hackathon organized by the CSI UEMK Student Chapter to test the mettle of students between the two IEM campuses.</p>
            <p>The event is scheduled for <span style="color: var(--neon-cyan);">28th March, 2026, 9:00 AM onwards</span>. Prepare your logic, set your screens and prepare for 28th!</p>
        </div>

        <div class="glass-panel">
            <h2>REGISTRATION PANEL</h2>
            
            <label>UPLINK_MODE *</label>
            <select id="role" onchange="upd()">
                <option value="leader">REGISTER NEW TEAM (LEADER)</option>
                <option value="member">CHECK REGISTRATION STATUS</option>
            </select>

            <div id="L">
                <div class="form-grid">
                    <div>
                        <label>TEAM NAME *</label>
                        <input type="text" id="tn" placeholder="e.g. CyberPunks" autocomplete="off">
                    </div>
                    <div>
                        <label>LEADER DISCORD HANDLE *</label>
                        <input type="text" id="lu" placeholder="e.g. anura_dev" autocomplete="off">
                    </div>
                </div>

                <div class="full-width" style="margin-bottom: 20px;">
                    <label>TEAM MEMBERS (DISCORD HANDLES) *</label>
                    <div id="mems"></div>
                    <button onclick="add()" class="btn-secondary">+ ADD TEAM MEMBER</button>
                </div>

                <button onclick="reg()">SUBMIT UPLINK</button>
            </div>

            <div id="M" class="hidden">
                <div class="full-width" style="margin-bottom: 20px;">
                    <label>YOUR DISCORD HANDLE *</label>
                    <input type="text" id="cu" placeholder="e.g. anura_dev" autocomplete="off">
                </div>
                <button onclick="chk()" class="btn-secondary">FETCH STATUS DATA</button>
            </div>
            
            <div id="msg" class="msg hidden"></div>
        </div>
    </div>

    <script>
        // Update this link to your actual Discord Server invite
        const INVITE = "https://discord.gg/YOUR_INVITE_LINK_HERE"; 

        function upd() {
            const isL = document.getElementById('role').value === 'leader';
            document.getElementById('L').classList.toggle('hidden', !isL);
            document.getElementById('M').classList.toggle('hidden', isL);
            document.getElementById('msg').classList.add('hidden');
        }

        function add() {
            const container = document.getElementById('mems');
            if (container.children.length >= 3) {
                alert("Maximum 4 members allowed (Leader + 3 Members).");
                return;
            }
            const i = document.createElement('input');
            i.placeholder = "MEMBER DISCORD HANDLE";
            i.style.marginBottom = "10px";
            container.appendChild(i);
        }

        async function reg() {
            const btn = document.querySelector('#L button:last-child');
            btn.innerText = "PROCESSING...";
            
            const usernames = [document.getElementById('lu').value, ...Array.from(document.querySelectorAll('#mems input')).map(x=>x.value)].filter(Boolean);
            const team_name = document.getElementById('tn').value;

            if(!team_name || usernames.length === 0) {
                alert("Team Name and Leader Handle are required.");
                btn.innerText = "SUBMIT UPLINK";
                return;
            }

            try {
                const res = await fetch('/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({team_name: team_name, usernames: usernames})
                });
                hndl(res);
            } catch (e) {
                alert("Failed to connect to backend server.");
            }
            btn.innerText = "SUBMIT UPLINK";
        }

        async function chk() {
            const handle = document.getElementById('cu').value;
            if(!handle) return;
            
            const btn = document.querySelector('#M button');
            btn.innerText = "FETCHING...";
            
            try {
                const res = await fetch('/status/' + encodeURIComponent(handle));
                hndl(res);
            } catch(e) {
                alert("Failed to connect to backend server.");
            }
            btn.innerText = "FETCH STATUS DATA";
        }

        async function hndl(res) {
            const d = await res.json();
            const m = document.getElementById('msg');
            m.className = `msg ${res.ok ? '' : 'error'}`;
            
            let html = `> ${d.message || d.error}`;
            if (res.ok) {
                html += `<br><br><a href="${INVITE}" target="_blank" class="join-btn">CONNECT TO DISCORD GRID</a>`;
            }
            m.innerHTML = html;
            m.classList.remove('hidden');
        }
    </script>
</body>
</html>
