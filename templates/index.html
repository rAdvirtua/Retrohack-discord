<!DOCTYPE html>
<html>
<head>
    <title>RetroHack | Registration</title>
    <style>
        body { background: #1e1e2e; color: #cdd6f4; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 40px; }
        .card { background: #313244; padding: 30px; border-radius: 12px; width: 450px; box-shadow: 0 8px 30px rgba(0,0,0,0.5); }
        input, select { width: 95%; padding: 12px; margin: 10px 0; background: #181825; border: 1px solid #45475a; color: white; border-radius: 6px; }
        button { width: 100%; padding: 12px; background: #89b4fa; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: #11111b; margin-top: 10px;}
        .hidden { display: none; }
        .member-entry { border-top: 1px solid #45475a; margin-top: 10px; padding-top: 10px; }
        .status-msg { margin-top: 15px; padding: 10px; border-radius: 6px; text-align: center; }
        .success { background: #a6e3a1; color: #11111b; }
        .error { background: #f38ba8; color: #11111b; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="text-align:center; margin-top:0;">🚀 RetroHack 2026</h2>
        
        <label>Are you a Team Leader?</label>
        <select id="roleToggle" onchange="toggleRole()">
            <option value="leader">Yes, I am the Leader</option>
            <option value="member">No, I am a Member</option>
        </select>

        <div id="leaderSection">
            <input type="text" id="team_name" placeholder="Team Name">
            <input type="text" id="leader_discord" placeholder="Your Discord Username (no @)">
            
            <div id="memberContainer">
                <p style="font-size: 0.8em; color: #9399b2;">Add your teammates' Discord usernames below:</p>
            </div>
            <button type="button" onclick="addMemberField()" style="background: #fab387; margin-bottom: 10px;">+ Add Teammate</button>
            <button onclick="submitRegistration()">Register Team</button>
        </div>

        <div id="memberSection" class="hidden">
            <input type="text" id="check_username" placeholder="Enter your Discord Username">
            <button onclick="checkStatus()" style="background: #cba6f7;">Check My Team Status</button>
        </div>

        <div id="msg" class="status-msg hidden"></div>
    </div>

    <script>
        const DISCORD_LINK = "https://discord.gg/yourlink"; // REPLACE THIS

        function toggleRole() {
            const isLeader = document.getElementById('roleToggle').value === 'leader';
            document.getElementById('leaderSection').classList.toggle('hidden', !isLeader);
            document.getElementById('memberSection').classList.toggle('hidden', isLeader);
            document.getElementById('msg').classList.add('hidden');
        }

        function addMemberField() {
            const container = document.getElementById('memberContainer');
            const input = document.createElement('input');
            input.type = 'text';
            input.placeholder = "Teammate Discord Username";
            input.className = "teammate-input";
            container.appendChild(input);
        }

        async function submitRegistration() {
            const teammates = Array.from(document.querySelectorAll('.teammate-input')).map(i => i.value.toLowerCase().trim());
            const usernames = [document.getElementById('leader_discord').value.toLowerCase().trim(), ...teammates];
            
            const payload = {
                team_name: document.getElementById('team_name').value,
                usernames: usernames.filter(u => u !== "")
            };

            const res = await fetch('/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            showMsg(data.message, res.ok ? 'success' : 'error', res.ok ? DISCORD_LINK : null);
        }

        async function checkStatus() {
            const username = document.getElementById('check_username').value.toLowerCase().trim();
            const res = await fetch(`/status/${username}`);
            const data = await res.json();
            showMsg(data.message, res.ok ? 'success' : 'error', res.ok ? DISCORD_LINK : null);
        }

        function showMsg(text, type, link) {
            const msgDiv = document.getElementById('msg');
            msgDiv.className = `status-msg ${type}`;
            msgDiv.innerHTML = text + (link ? `<br><br><a href="${link}" style="color:inherit; font-weight:bold;">Join Discord Server</a>` : '');
            msgDiv.classList.remove('hidden');
        }
    </script>
</body>
</html>
