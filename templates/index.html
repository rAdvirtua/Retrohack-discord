<!DOCTYPE html>
<html>
<head>
    <title>RetroHack Register</title>
    <style>
        body { background: #1e1e2e; color: #cdd6f4; font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .card { background: #313244; padding: 20px; border-radius: 10px; width: 350px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        input { width: 93%; padding: 10px; margin: 10px 0; background: #181825; border: 1px solid #45475a; color: white; border-radius: 5px; }
        button { width: 100%; padding: 10px; background: #89b4fa; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .gen-btn { background: #f5c2e7; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Team Registration</h2>
        <input type="text" id="team_name" placeholder="Team Name">
        <input type="text" id="discord_username" placeholder="Discord Username (no @)">
        
        <div style="display:flex; gap:5px;">
            <input type="text" id="team_code" placeholder="Click Generate" readonly>
            <button class="gen-btn" onclick="generateCode()" style="width: auto;">Gen</button>
        </div>

        <button onclick="submitData()">Register Team</button>
        <p id="msg" style="text-align:center; font-size: 0.9em;"></p>
    </div>

    <script>
        function generateCode() {
            const code = Math.random().toString(36).substring(2, 8).toUpperCase();
            document.getElementById('team_code').value = code;
        }

        async function submitData() {
            const payload = {
                team_name: document.getElementById('team_name').value,
                discord_username: document.getElementById('discord_username').value,
                team_code: document.getElementById('team_code').value
            };
            const res = await fetch('/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            document.getElementById('msg').innerText = data.message;
        }
    </script>
</body>
</html>
