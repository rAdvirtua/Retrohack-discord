<!DOCTYPE html>
<html>
<head>
    <title>RetroHack 2026</title>
    <style>
        body { background: #1e1e2e; color: #cdd6f4; font-family: sans-serif; display: flex; justify-content: center; padding: 40px; }
        .card { background: #313244; padding: 25px; border-radius: 12px; width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #181825; border: 1px solid #45475a; color: white; border-radius: 6px; box-sizing: border-box;}
        button { width: 100%; padding: 12px; background: #89b4fa; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .hidden { display: none; }
        .status { margin-top: 20px; padding: 15px; border-radius: 6px; text-align: center; font-weight: bold; }
        .success { background: #a6e3a1; color: #11111b; }
        .error { background: #f38ba8; color: #11111b; }
    </style>
</head>
<body>
    <div class="card">
        <h2>RetroHack Registration</h2>
        <select id="role" onchange="updateUI()">
            <option value="leader">I am the Leader</option>
            <option value="member">I am a Member</option>
        </select>

        <div id="leaderUI">
            <input type="text" id="t_name" placeholder="Team Name">
            <input type="text" id="l_user" placeholder="Your Discord Username">
            <div id="members"></div>
            <button onclick="addM()" style="background:#fab387">+ Teammate</button>
            <button onclick="reg()">Register Team</button>
        </div>

        <div id="memberUI" class="hidden">
            <input type="text" id="c_user" placeholder="Your Discord Username">
            <button onclick="check()">Check Status</button>
        </div>
        <div id="msg" class="status hidden"></div>
    </div>

    <script>
        const LINK = "https://discord.gg/uazpQESzus"; 
        function updateUI() {
            const isL = document.getElementById('role').value === 'leader';
            document.getElementById('leaderUI').classList.toggle('hidden', !isL);
            document.getElementById('memberUI').classList.toggle('hidden', isL);
        }
        function addM() {
            const i = document.createElement('input');
            i.placeholder = "Teammate Discord Username";
            i.className = "m-input";
            document.getElementById('members').appendChild(i);
        }
        async function reg() {
            const usernames = [document.getElementById('l_user').value, ...Array.from(document.querySelectorAll('.m-input')).map(x=>x.value)];
            const res = await fetch('/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({team_name: document.getElementById('t_name').value, usernames})
            });
            handle(res);
        }
        async function check() {
            const res = await fetch('/status/' + document.getElementById('c_user').value);
            handle(res);
        }
        async function handle(res) {
            const d = await res.json();
            const m = document.getElementById('msg');
            m.className = `status ${res.ok ? 'success' : 'error'}`;
            m.innerHTML = d.message + (res.ok ? `<br><br><a href="${LINK}">Join Discord</a>` : '');
            m.classList.remove('hidden');
        }
    </script>
</body>
</html>
