<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetroHack 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #22d3ee;
            --neon-pink: #ec4899;
            /* High-contrast Translucent Background */
            --glass-bg: rgba(7, 7, 15, 0.75); 
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Press Start 2P', cursive;
            min-height: 180vh;
            color: #fff;
            background-color: #020205;
            overflow-x: hidden;
            -webkit-font-smoothing: none; /* Keeps the pixel font sharp */
        }

        /* --- DYNAMIC BACKGROUND --- */
        #dynamic-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background-size: cover;
            background-position: center 0%;
            background-attachment: fixed;
            transition: background 0.1s ease-out;
        }

        /* CRT SCANLINE EFFECT */
        body:after {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%);
            z-index: 100;
            background-size: 100% 4px;
            pointer-events: none;
            opacity: 0.3;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        /* --- MASSIVE HEADER --- */
        header {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero-title {
            font-size: clamp(35px, 12vw, 120px); 
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: -0.05em; 
            line-height: 1;
            margin: 0;
            /* Heavy shadow for maximum readability */
            text-shadow: 6px 6px 0px #000, 0 0 20px rgba(34, 211, 238, 0.5);
            white-space: nowrap;
        }

        .hero-title span { color: var(--neon-pink); text-shadow: 6px 6px 0px #000, 0 0 20px rgba(236, 72, 153, 0.5); }

        .scroll-hint {
            margin-top: 40px;
            font-size: 9px;
            color: var(--neon-cyan);
            letter-spacing: 0.4em;
            animation: pulse 2s infinite;
            text-shadow: 2px 2px 0px #000;
        }

        /* --- GLASSMORPHIC CARD --- */
        .card {
            background: var(--glass-bg);
            /* Strong blur to "mute" background details */
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            padding: 40px;
            border: 2px solid var(--neon-cyan);
            border-radius: 4px;
            width: 90%;
            max-width: 440px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8), inset 0 0 15px rgba(34, 211, 238, 0.1);
            z-index: 10;
            margin-bottom: 100px;
            box-sizing: border-box;
        }

        .card h2 { 
            text-align: center; color: var(--neon-pink); font-size: 13px; 
            margin-bottom: 30px; letter-spacing: 0.1em;
            text-shadow: 2px 2px 0px #000;
        }

        select, input { 
            width: 100%; padding: 16px; margin-bottom: 20px; 
            background: rgba(0, 0, 0, 0.6); 
            border: 1px solid var(--neon-cyan); 
            color: #fff; 
            font-family: 'Press Start 2P', cursive; 
            font-size: 10px; 
            box-sizing: border-box; 
            outline: none;
            text-shadow: 1px 1px 0px #000;
        }

        input:focus { border-color: var(--neon-pink); box-shadow: 0 0 10px var(--neon-pink); }

        button { 
            width: 100%; padding: 18px; 
            background: var(--neon-cyan); border: none; 
            color: #000; font-family: 'Press Start 2P', cursive; 
            font-size: 11px; font-weight: bold; cursor: pointer; 
            margin-top: 10px; box-shadow: 5px 5px 0px #083344;
            transition: 0.1s;
        }

        button:hover { background: var(--neon-pink); box-shadow: 5px 5px 0px #500724; transform: translate(-2px, -2px); }
        button:active { transform: translate(2px, 2px); box-shadow: none; }

        .msg { 
            margin-top: 25px; padding: 15px; font-size: 8px; 
            text-align: center; border: 1px dashed #fff; 
            background: rgba(0,0,0,0.3); text-shadow: 1px 1px 0px #000;
        }

        .join-btn { 
            display: block; margin-top: 15px; padding: 12px; 
            color: var(--neon-pink); border: 2px solid var(--neon-pink); 
            text-decoration: none; text-align: center; font-size: 9px;
            background: rgba(0,0,0,0.2); transition: 0.2s;
        }
        .join-btn:hover { background: var(--neon-pink); color: #000; }

        .hidden { display: none; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        @media (max-width: 480px) {
            .hero-title { font-size: 10vw; }
            .card { padding: 25px; }
        }
    </style>
</head>
<body>

    <div id="dynamic-bg"></div>

    <div class="container">
        <header>
            <h1 class="hero-title">RETRO<span>HACK</span></h1>
            <p class="scroll-hint">SCROLL_FOR_UPLINK</p>
        </header>

        <div class="card">
            <h2>[ SYSTEM_ACCESS_NODE ]</h2>
            
            <select id="role" onchange="upd()">
                <option value="leader">INITIALIZE_LEADER</option>
                <option value="member">STATUS_QUERY</option>
            </select>

            <div id="L">
                <input type="text" id="tn" placeholder="TEAM_NAME" autocomplete="off">
                <input type="text" id="lu" placeholder="DISCORD_HANDLE" autocomplete="off">
                <div id="mems"></div>
                <button onclick="add()" style="background:#fab387; box-shadow: 5px 5px 0px #7c2d12; margin-bottom: 15px;">+ ADD_UNIT</button>
                <button onclick="reg()">SUBMIT_UPLINK</button>
            </div>

            <div id="M" class="hidden">
                <input type="text" id="cu" placeholder="YOUR_HANDLE" autocomplete="off">
                <button onclick="chk()" style="background:#cba6f7; box-shadow: 5px 5px 0px #4c1d95;">FETCH_DATA</button>
            </div>
            
            <div id="msg" class="msg hidden"></div>
        </div>
    </div>

    <script>
        const INVITE = "https://discord.gg/ZnUPDBNnqA"; 
        const BG_IMG = "https://pandadsgn.github.io/Retrohack_2026/unnamed.jpg";

        function updateOverlay() {
            const scrollHeight = document.documentElement.scrollHeight - window.innerHeight;
            const scrollPct = scrollHeight > 0 ? window.scrollY / scrollHeight : 0;
            const bg = document.getElementById('dynamic-bg');
            
            const opacity = 0.5 + (scrollPct * 0.3); 
            const rTop = 255 - (scrollPct * 150);
            const gTop = 100 - (scrollPct * 100);
            const bTop = 50 + (scrollPct * 50);
            const rBot = 20 - (scrollPct * 20);
            const gBot = 10 - (scrollPct * 10);
            const bBot = 40 + (scrollPct * 20);

            bg.style.backgroundImage = `linear-gradient(rgba(${rTop},${gTop},${bTop},${opacity}), rgba(${rBot},${gBot},${bBot},0.95)), url('${BG_IMG}')`;
            bg.style.backgroundPosition = `50% ${scrollPct * 100}%`;
        }

        window.addEventListener('DOMContentLoaded', updateOverlay);
        window.addEventListener('scroll', updateOverlay);

        function upd() {
            const isL = document.getElementById('role').value === 'leader';
            document.getElementById('L').classList.toggle('hidden', !isL);
            document.getElementById('M').classList.toggle('hidden', isL);
            document.getElementById('msg').classList.add('hidden');
        }

        function add() {
            const container = document.getElementById('mems');
            if (container.children.length >= 4) return;
            const i = document.createElement('input');
            i.placeholder = "MEMBER_HANDLE";
            i.style.borderLeft = "4px solid var(--neon-pink)";
            container.appendChild(i);
        }

        async function reg() {
            const usernames = [document.getElementById('lu').value, ...Array.from(document.querySelectorAll('#mems input')).map(x=>x.value)];
            const res = await fetch('/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({team_name: document.getElementById('tn').value, usernames})
            });
            hndl(res);
        }

        async function chk() {
            const res = await fetch('/status/' + encodeURIComponent(document.getElementById('cu').value));
            hndl(res);
        }

        async function hndl(res) {
            const d = await res.json();
            const m = document.getElementById('msg');
            m.className = `msg ${res.ok ? '' : 'error'}`;
            m.style.color = res.ok ? "#4ade80" : "#f87171";
            let html = `> ${d.message}`;
            if (res.ok) html += `<a href="${INVITE}" target="_blank" class="join-btn">CONNECT_TO_GRID</a>`;
            m.innerHTML = html;
            m.classList.remove('hidden');
        }
    </script>
</body>
</html>
