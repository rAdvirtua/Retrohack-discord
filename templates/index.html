<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetroHack 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #22d3ee;
            --neon-pink: #ec4899;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Press Start 2P', cursive;
            min-height: 200vh;
            color: #fff;
            background-color: #020205;
            overflow-x: hidden;
        }

        /* --- DYNAMIC BACKGROUND --- */
        #dynamic-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            /* Start with a neutral state, JS will override this instantly */
            background-color: #020205;
            background-size: cover;
            background-position: center 0%;
            background-attachment: fixed;
            transition: background 0.1s ease-out;
        }

        /* CRT SCANLINE EFFECT */
        body:after {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            z-index: 100;
            background-size: 100% 4px;
            pointer-events: none;
            opacity: 0.4;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- THE MASSIVE TITLE --- */
        header {
            height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            width: 100%;
        }

        .hero-title {
            font-size: clamp(40px, 12vw, 130px); 
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: -0.05em; 
            line-height: 0.9;
            margin: 0;
            text-shadow: 8px 8px 0px rgba(0,0,0,0.8), 0 0 30px rgba(236, 72, 153, 0.3);
            white-space: nowrap;
        }

        .hero-title span { color: var(--neon-pink); }

        .scroll-hint {
            margin-top: 40px;
            font-size: 10px;
            color: var(--neon-cyan);
            letter-spacing: 0.5em;
            animation: pulse 2s infinite;
            text-transform: uppercase;
        }

        /* --- FORM CARD --- */
        .card {
            background: rgba(10, 10, 25, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 35px;
            border: 2px solid var(--neon-cyan);
            border-radius: 4px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 20px 50px rgba(0,0,0,1), 0 0 20px rgba(34,211,238,0.2);
            z-index: 10;
            margin-bottom: 100px;
        }

        h2 { text-align: center; color: var(--neon-pink); font-size: 14px; margin-bottom: 25px; line-height: 1.6; }
        select, input { width: 100%; padding: 14px; margin: 10px 0; background: rgba(0, 0, 0, 0.7); border: 1px solid var(--neon-cyan); color: var(--neon-cyan); font-family: 'Press Start 2P', cursive; font-size: 10px; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 15px; background: var(--neon-cyan); border: none; color: #000; font-family: 'Press Start 2P', cursive; font-size: 11px; font-weight: bold; cursor: pointer; margin-top: 12px; box-shadow: 4px 4px 0px #083344; }
        button:hover { background: var(--neon-pink); box-shadow: 4px 4px 0px #500724; transform: translate(-2px, -2px); }
        .msg { margin-top: 20px; padding: 12px; font-size: 8px; text-align: center; background: rgba(0, 0, 0, 0.5); border: 1px dashed #fff; }
        .join-btn { display: block; margin-top: 15px; padding: 12px; color: var(--neon-pink); border: 2px solid var(--neon-pink); text-decoration: none; text-align: center; font-size: 9px; }
        .hidden { display: none; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        @media (max-width: 480px) {
            .hero-title { font-size: 11vw; }
            .card { padding: 20px; }
        }
    </style>
</head>
<body>

    <div id="dynamic-bg"></div>

    <div class="container">
        <header>
            <h1 class="hero-title">RETRO<span>HACK</span></h1>
            <p class="scroll-hint">SCROLL_DOWN_FOR_UPLINK</p>
        </header>

        <div class="card">
            <h2>SYSTEM_ACCESS_NODE</h2>
            <select id="role" onchange="upd()">
                <option value="leader">LEADER_REGISTRATION</option>
                <option value="member">STATUS_CHECK</option>
            </select>

            <div id="L">
                <input type="text" id="tn" placeholder="TEAM_NAME">
                <input type="text" id="lu" placeholder="DISCORD_HANDLE">
                <div id="mems"></div>
                <button onclick="add()" style="background:#fab387; box-shadow: 4px 4px 0px #7c2d12;">+ ADD_UNIT</button>
                <button onclick="reg()">INITIALIZE_TEAM</button>
            </div>

            <div id="M" class="hidden">
                <input type="text" id="cu" placeholder="DISCORD_HANDLE">
                <button onclick="chk()" style="background:#cba6f7; box-shadow: 4px 4px 0px #4c1d95;">VERIFY_UPLINK</button>
            </div>
            <div id="msg" class="msg hidden"></div>
        </div>
    </div>

    <script>
        const INVITE = "https://discord.gg/ZnUPDBNnqA"; 
        const BG_IMG = "https://pandadsgn.github.io/Retrohack_2026/unnamed.jpg";

        // Function to apply the overlay based on current scroll
        function updateOverlay() {
            const scrollHeight = document.documentElement.scrollHeight - window.innerHeight;
            const scrollPct = scrollHeight > 0 ? window.scrollY / scrollHeight : 0;
            const bg = document.getElementById('dynamic-bg');
            
            // Logic from your provided script
            const opacity = 0.4 + (scrollPct * 0.4);
            const rTop = 255 - (scrollPct * 150);
            const gTop = 100 - (scrollPct * 100);
            const bTop = 50 + (scrollPct * 50);
            const rBot = 20 - (scrollPct * 20);
            const gBot = 10 - (scrollPct * 10);
            const bBot = 40 + (scrollPct * 20);

            const colorTop = `rgba(${rTop}, ${gTop}, ${bTop}, ${opacity})`;
            const colorBot = `rgba(${rBot}, ${gBot}, ${bBot}, 0.9)`;
            
            bg.style.backgroundImage = `linear-gradient(${colorTop}, ${colorBot}), url('${BG_IMG}')`;
            bg.style.backgroundPosition = `50% ${scrollPct * 100}%`;
        }

        // Initialize immediately on load
        window.addEventListener('DOMContentLoaded', updateOverlay);
        // Update on scroll
        window.addEventListener('scroll', updateOverlay);

        function upd() {
            const isL = document.getElementById('role').value === 'leader';
            document.getElementById('L').classList.toggle('hidden', !isL);
            document.getElementById('M').classList.toggle('hidden', isL);
            document.getElementById('msg').classList.add('hidden');
        }

        function add() {
            const container = document.getElementById('mems');
            if (container.children.length >= 4) return;
            const i = document.createElement('input');
            i.placeholder = "UNIT_HANDLE";
            i.style.borderLeft = "4px solid var(--neon-pink)";
            container.appendChild(i);
        }

        async function reg() {
            const usernames = [document.getElementById('lu').value, ...Array.from(document.querySelectorAll('#mems input')).map(x=>x.value)];
            const res = await fetch('/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({team_name: document.getElementById('tn').value, usernames})
            });
            hndl(res);
        }

        async function chk() {
            const res = await fetch('/status/' + encodeURIComponent(document.getElementById('cu').value));
            hndl(res);
        }

        async function hndl(res) {
            const d = await res.json();
            const m = document.getElementById('msg');
            m.className = `msg ${res.ok ? '' : 'error'}`;
            m.style.color = res.ok ? "#4ade80" : "#f87171";
            let html = `> ${d.message}`;
            if (res.ok) html += `<a href="${INVITE}" target="_blank" class="join-btn">CONNECT_TO_GRID</a>`;
            m.innerHTML = html;
            m.classList.remove('hidden');
        }
    </script>
</body>
</html>
