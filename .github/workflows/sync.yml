name: Sync to Hugging Face
on:
  push:
    branches: [main] # Change to master if your branch is named master

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force https://rAdvirtua:$HF_TOKEN@huggingface.co/spaces/rAdvirtua/retrohack-discord main
